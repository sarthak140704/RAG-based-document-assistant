<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <style>
      .box { fill:#eef2ff; stroke:#4f46e5; stroke-width:2; rx:10; }
      .store { fill:#ecfeff; stroke:#0891b2; stroke-width:2; rx:10; }
      .llm { fill:#fef3c7; stroke:#d97706; stroke-width:2; rx:10; }
      .io { fill:#f1f5f9; stroke:#475569; stroke-width:2; rx:10; }
      .t { font-size:15px; fill:#0f172a; font-weight:600; }
      .s { font-size:12px; fill:#475569; }
      .lbl { font-size:12px; fill:#64748b; font-style:italic; }
      .edge { stroke:#64748b; stroke-width:2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>

  <text x="30" y="34" font-size="20" font-weight="700" fill="#0f172a">Research Assistant — RAG Pipeline</text>

  <!-- Ingestion row -->
  <rect class="io" x="30" y="70" width="150" height="64" rx="10"/>
  <text class="t" x="105" y="98" text-anchor="middle">Documents</text>
  <text class="s" x="105" y="118" text-anchor="middle">PDF / TXT / MD</text>

  <rect class="box" x="220" y="70" width="160" height="64" rx="10"/>
  <text class="t" x="300" y="98" text-anchor="middle">Ingestion</text>
  <text class="s" x="300" y="118" text-anchor="middle">chunk + page metadata</text>

  <rect class="box" x="420" y="70" width="160" height="64" rx="10"/>
  <text class="t" x="500" y="98" text-anchor="middle">Embeddings</text>
  <text class="s" x="500" y="118" text-anchor="middle">sentence-transf. / hashing</text>

  <rect class="store" x="640" y="70" width="170" height="64" rx="10"/>
  <text class="t" x="725" y="98" text-anchor="middle">Vector Store</text>
  <text class="s" x="725" y="118" text-anchor="middle">persistent cosine index</text>

  <path class="edge" d="M180,102 L216,102"/>
  <path class="edge" d="M380,102 L416,102"/>
  <path class="edge" d="M580,102 L636,102"/>

  <!-- Query row -->
  <rect class="io" x="30" y="300" width="150" height="64" rx="10"/>
  <text class="t" x="105" y="328" text-anchor="middle">Question</text>
  <text class="s" x="105" y="348" text-anchor="middle">+ chat history</text>

  <rect class="box" x="420" y="300" width="160" height="64" rx="10"/>
  <text class="t" x="500" y="328" text-anchor="middle">Retrieve top-k</text>
  <text class="s" x="500" y="348" text-anchor="middle">cosine similarity</text>

  <rect class="llm" x="640" y="300" width="170" height="64" rx="10"/>
  <text class="t" x="725" y="328" text-anchor="middle">LLM</text>
  <text class="s" x="725" y="348" text-anchor="middle">OpenAI / Groq / Ollama</text>

  <!-- Question -> Retrieve (via condense) -->
  <path class="edge" d="M180,332 L416,332"/>
  <text class="lbl" x="298" y="322" text-anchor="middle">condense query</text>

  <!-- Vector store -> Retrieve -->
  <path class="edge" d="M725,134 L725,180 L500,180 L500,296"/>
  <text class="lbl" x="612" y="172" text-anchor="middle">nearest neighbours</text>

  <!-- Retrieve -> LLM -->
  <path class="edge" d="M580,332 L636,332"/>

  <!-- LLM -> Answer -->
  <rect class="io" x="640" y="380" width="230" height="46" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text class="t" x="755" y="408" text-anchor="middle">Answer + citations [1][2]</text>
  <path class="edge" d="M725,364 L725,376"/>
</svg>
