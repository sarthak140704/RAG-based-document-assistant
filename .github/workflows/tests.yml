name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Use the dependency-light hashing embedder so CI stays fast (no torch).
      EMBEDDING_BACKEND: hashing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pypdf python-dotenv pytest

      - name: Run tests
        run: python -m pytest -q
